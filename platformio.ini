; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; Gemeinsame Einstellungen fuer alle Environments
[env]
platform = espressif32
board = esp32dev
framework = arduino
lib_deps =
	FastLED
	adafruit/DHT sensor library@^1.4.6
	milesburton/DallasTemperature@^3.11.0

[env:solar_links_Serial]
build_flags = -DSOLAR_LINKS
upload_port = COM18

[env:solar_links_OTA]
build_flags = -DSOLAR_LINKS
upload_protocol = espota
upload_port = 172.24.115.135
upload_flags =
    --timeout=60


[env:solar_rechts_Serial]
build_flags = -DSOLAR_RECHTS
upload_port = COM19

[env:solar_rechts_OTA]
build_flags = -DSOLAR_RECHTS
upload_protocol = espota
upload_port = 172.24.115.189
upload_flags =
    --timeout=60
